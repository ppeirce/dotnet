<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Judge Not</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background-color: #3d3530;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Subtle noise/texture overlay */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
      background-size: 200px 200px;
      pointer-events: none;
      z-index: 1;
    }

    /* Vignette effect */
    #body::after {
    #  content: '';
    #  position: absolute;
    #  inset: 0;
    #  background: radial-gradient(ellipse at center, transparent 50%, rgba(0, 0, 0, 0.3) 100%);
    #  pointer-events: none;
    #  z-index: 2;
    #}

    .text {
      #transform: rotate(-6deg);
      text-align: center;
      z-index: 3;
      position: relative;
      margin-top: -2%;
    }

    .text p {
      font-family: 'Playfair Display', 'Georgia', 'Times New Roman', serif;
      font-weight: 700;
      color: #e8e4df;
      font-size: clamp(2rem, 5.5vw, 5rem);
      line-height: 1.25;
      text-shadow: 1px 2px 4px rgba(0, 0, 0, 0.3);
      letter-spacing: 0.01em;
    }
  </style>
</head>
<body>
  <div class="text">
    <p>Judge not,<br>lest ye be judged.</p>
  </div>
</body>
</html>
